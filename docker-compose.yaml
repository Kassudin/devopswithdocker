services:
  app:
    image: kassudin/devopswithdocker2:latest
    ports:
      - "8080:8080"
  
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    environment:
      - WATCHTOWER_POLL_INTERVAL=60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped